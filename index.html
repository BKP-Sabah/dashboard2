<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sabah Dental Health KPI Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f6f8fc;
  --surface: rgba(255,255,255,0.92);
  --surface2: #eef3fb;
  --surface3: #f8fafc;
  --border: rgba(36,54,101,0.12);
  --border-strong: rgba(37,99,235,0.22);
  --text: #122033;
  --text-dim: #64748b;
  --muted: #94a3b8;
  --accent: #1d4ed8;
  --green: #15803d;
  --green-dim: rgba(22,163,74,0.12);
  --amber: #b7791f;
  --amber-dim: rgba(245,158,11,0.14);
  --red: #b91c1c;
  --red-dim: rgba(239,68,68,0.12);
  --shadow: 0 20px 55px rgba(15,23,42,0.08);
  --shadow-soft: 0 10px 30px rgba(15,23,42,0.06);
  --radius: 22px;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  min-height:100vh;
  overflow-x:hidden;
  background:
    radial-gradient(circle at top left, rgba(37,99,235,.14), transparent 30%),
    radial-gradient(circle at 90% 12%, rgba(20,184,166,.12), transparent 28%),
    linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
  color:var(--text);
  font-family:'DM Sans', system-ui, -apple-system, sans-serif;
  font-size:18px;
}
body::before {
  content:'';
  position:fixed; inset:0;
  pointer-events:none;
  background-image:
    linear-gradient(rgba(15,23,42,.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(15,23,42,.03) 1px, transparent 1px);
  background-size:42px 42px;
  mask-image:linear-gradient(to bottom, rgba(0,0,0,.35), transparent 55%);
}

.app { position:relative; z-index:1; max-width:1500px; margin:0 auto; padding:34px 34px 52px; }

/* Header — glassmorphic card with decorative circle */
.header {
  display:grid;
  grid-template-columns:minmax(0,1fr) auto;
  align-items:end;
  gap:24px;
  margin-bottom:22px;
  padding:30px;
  border:1px solid var(--border);
  border-radius:30px;
  background:
    linear-gradient(135deg, rgba(255,255,255,.98), rgba(239,246,255,.92)),
    var(--surface);
  box-shadow:var(--shadow);
  overflow:hidden;
  position:relative;
}
.header::after {
  content:'';
  position:absolute;
  width:320px; height:320px;
  border-radius:999px;
  right:-135px; top:-155px;
  background:radial-gradient(circle, rgba(37,99,235,.18), transparent 70%);
}
.header > * { position:relative; z-index:1; }
.header h1 {
  font-family:'DM Sans', system-ui, sans-serif;
  font-weight:800;
  font-size:clamp(36px, 4vw, 54px);
  letter-spacing:-1.8px;
  line-height:.98;
  color:var(--text);
  max-width:930px;
}
.header h1 span {
  color:var(--accent);
  background:linear-gradient(90deg, #1d4ed8, #0f766e);
  -webkit-background-clip:text;
  background-clip:text;
  -webkit-text-fill-color:transparent;
}
.header-sub { margin-top:14px; color:var(--text-dim); font-size:20px; font-weight:500; line-height:1.45; }
.period-badge {
  display:inline-flex; align-items:center; justify-content:center;
  min-width:210px;
  background:#fff;
  border:1px solid var(--border-strong);
  border-radius:999px;
  padding:14px 24px;
  font-size:18px;
  color:var(--accent);
  font-weight:800;
  box-shadow:var(--shadow-soft);
  white-space:nowrap;
}
.data-source {
  display:inline-flex; align-items:center; gap:8px;
  margin-top:16px; padding:8px 12px;
  border-radius:999px;
  background:rgba(255,255,255,.72);
  border:1px solid var(--border);
  font-size:14px; font-weight:700; color:var(--text-dim);
}
.data-source a { color:var(--accent); text-decoration:none; }
.data-source .dot { display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:0; vertical-align:middle; box-shadow:0 0 0 4px rgba(22,163,74,.12); }

/* Tabs — pill container */
.nav-tabs {
  display:flex; gap:8px; margin-bottom:24px; overflow-x:auto;
  padding:7px;
  border:1px solid var(--border);
  border-radius:18px;
  background:rgba(255,255,255,.68);
  box-shadow:0 8px 22px rgba(15,23,42,.04);
  scrollbar-width:thin;
}
.nav-tab {
  padding:14px 22px; border-radius:13px;
  font-size:18px; font-weight:800; cursor:pointer;
  border:1px solid transparent; background:transparent;
  color:var(--text-dim); transition:all .2s ease;
  white-space:nowrap; letter-spacing:-0.15px;
}
.nav-tab:hover { color:var(--accent); background:rgba(37,99,235,.07); }
.nav-tab.active {
  background:#ffffff; color:var(--accent);
  border-color:var(--border-strong);
  box-shadow:0 9px 22px rgba(37,99,235,.10);
}

/* Cards — top bar gradient + decorative circle */
.summary-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:16px; margin-bottom:28px; }
.summary-card {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:22px 22px 20px;
  position:relative; overflow:hidden;
  box-shadow:var(--shadow-soft);
  min-height:145px;
}
.summary-card::before {
  content:''; position:absolute; inset:0 0 auto 0;
  height:4px; background:var(--accent);
}
.summary-card::after {
  content:''; position:absolute;
  right:-38px; top:-50px;
  width:120px; height:120px;
  border-radius:999px;
  background:rgba(37,99,235,.08);
}
.summary-card.green::before { background:linear-gradient(90deg, var(--green), #22c55e); }
.summary-card.amber::before { background:linear-gradient(90deg, var(--amber), #f59e0b); }
.summary-card.red::before   { background:linear-gradient(90deg, var(--red), #ef4444); }
.summary-card.green::after  { background:var(--green-dim); }
.summary-card.amber::after  { background:var(--amber-dim); }
.summary-card.red::after    { background:var(--red-dim); }
.summary-card .label {
  position:relative; z-index:1;
  font-size:14px; text-transform:uppercase; letter-spacing:.9px;
  color:var(--text-dim); margin-bottom:13px; font-weight:900;
}
.summary-card .value {
  position:relative; z-index:1;
  font-family:'DM Sans', system-ui, sans-serif;
  font-size:clamp(32px, 3.5vw, 44px);
  letter-spacing:-1.8px; line-height:1; font-weight:900;
}
.summary-card .sub {
  position:relative; z-index:1;
  font-size:16px; color:var(--text-dim); margin-top:12px; line-height:1.35;
}

/* Grid + panels */
.dashboard-grid { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
.panel {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:24px;
  box-shadow:var(--shadow-soft);
}
.panel-title { font-size:22px; font-weight:900; margin-bottom:5px; letter-spacing:-0.4px; }
.panel-sub { font-size:16px; color:var(--text-dim); margin-bottom:18px; line-height:1.35; }
.panel.full { grid-column:1/-1; }

/* Heatmap */
.heatmap-table { width:100%; border-collapse:separate; border-spacing:6px; }
.heatmap-table th {
  font-size:14px; text-transform:uppercase; letter-spacing:.55px;
  color:var(--text-dim); padding:10px 10px; text-align:center; font-weight:900;
}
.heatmap-table th:first-child { text-align:left; position:sticky; left:0; z-index:3; background:var(--surface); }
.heatmap-table td {
  padding:12px 12px; text-align:center;
  border-radius:12px; font-size:16px; font-weight:900;
  border:1px solid transparent;
}
.heatmap-table td:first-child {
  text-align:left; font-weight:900; color:var(--text);
  background:#fff !important;
  position:sticky; left:0; z-index:2;
  min-width:145px; border-color:var(--border);
}
.heatmap-table tr:hover td:first-child { color:var(--accent); }
.cell-green { background:var(--green-dim); color:var(--green); border-color:rgba(22,163,74,.16) !important; }
.cell-amber { background:var(--amber-dim); color:var(--amber); border-color:rgba(245,158,11,.17) !important; }
.cell-red   { background:var(--red-dim);   color:var(--red);   border-color:rgba(239,68,68,.17) !important; }
.cell-na    { background:rgba(148,163,184,.12); color:var(--text-dim); font-style:italic; }

/* Bars — grid layout with pill-shaped tracks */
.bar-chart { display:flex; flex-direction:column; gap:12px; }
.bar-row { display:grid; grid-template-columns:140px minmax(120px,1fr) 80px; align-items:center; gap:14px; }
.bar-label { font-size:15px; color:var(--text-dim); text-align:right; font-weight:800; }
.bar-track {
  height:32px; background:var(--surface2);
  border-radius:999px; position:relative; overflow:hidden;
  box-shadow:inset 0 0 0 1px rgba(30,41,59,.04);
}
.bar-fill { height:100%; border-radius:999px; transition:width .8s ease; }
.bar-target { position:absolute; top:0; height:100%; width:2px; background:#0f172a; opacity:.36; }
.bar-value { font-size:15px; font-weight:900; text-align:right; }

/* Legend — pill badges */
.legend { display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap; }
.legend-item {
  display:flex; align-items:center; gap:8px;
  font-size:15px; font-weight:800; color:var(--text-dim);
  background:#fff; border:1px solid var(--border);
  border-radius:999px; padding:8px 14px;
}
.legend-dot { width:12px; height:12px; border-radius:999px; }


/* Trend — state-level historical charts */
.trend-toolbar {
  display:flex; gap:10px; align-items:center; justify-content:space-between;
  flex-wrap:wrap; margin-bottom:18px;
}
.trend-actions { display:flex; gap:8px; flex-wrap:wrap; }
.trend-btn {
  padding:10px 16px; border:1px solid var(--border);
  background:#fff; color:var(--text-dim);
  border-radius:999px; font-size:15px; font-weight:900;
  cursor:pointer; transition:all .2s ease;
}
.trend-btn:hover { color:var(--accent); border-color:var(--border-strong); background:rgba(37,99,235,.06); }
.trend-btn.active { color:#fff; background:var(--accent); border-color:var(--accent); }
.trend-group { margin-bottom:22px; }
.trend-group-title {
  display:flex; align-items:center; gap:10px;
  font-size:20px; font-weight:900; letter-spacing:-.3px;
  margin:4px 0 12px; color:var(--text);
}
.trend-group-title::before {
  content:''; width:10px; height:10px; border-radius:999px;
  background:var(--accent); box-shadow:0 0 0 5px rgba(37,99,235,.10);
}
.trend-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(360px,1fr)); gap:14px; }
.trend-card {
  border:1px solid var(--border); border-radius:18px; background:#fff;
  padding:16px; box-shadow:var(--shadow-soft); overflow:hidden;
}
.trend-card-header {
  display:flex; align-items:flex-start; justify-content:space-between; gap:12px;
  margin-bottom:10px;
}
.trend-card-title { font-size:17px; font-weight:900; line-height:1.2; letter-spacing:-.2px; }
.trend-chip {
  flex:0 0 auto; font-size:11px; font-weight:900; text-transform:uppercase;
  letter-spacing:.45px; border-radius:999px; padding:6px 9px;
  border:1px solid var(--border); color:var(--text-dim); background:var(--surface3);
}
.trend-chip.good { color:var(--green); background:var(--green-dim); border-color:rgba(22,163,74,.18); }
.trend-chip.watch { color:var(--amber); background:var(--amber-dim); border-color:rgba(245,158,11,.22); }
.trend-chip.bad { color:var(--red); background:var(--red-dim); border-color:rgba(239,68,68,.18); }
.trend-meta { display:flex; gap:8px; flex-wrap:wrap; margin:8px 0 10px; }
.trend-meta span {
  font-size:12px; font-weight:800; color:var(--text-dim);
  background:var(--surface2); border-radius:999px; padding:5px 8px;
}
.trend-svg-wrap {
  width:100%; height:210px; border-radius:14px;
  background:linear-gradient(180deg, var(--surface3), #fff);
  border:1px solid rgba(15,23,42,.06); overflow:hidden;
}
.trend-note { font-size:13px; color:var(--text-dim); line-height:1.35; margin-top:10px; }
.trend-empty {
  border:1px dashed var(--border-strong); border-radius:18px;
  padding:20px; background:rgba(37,99,235,.04); color:var(--text-dim);
  font-size:15px; line-height:1.5; font-weight:700;
}
.trend-template-table {
  width:100%; border-collapse:collapse; margin-top:10px; font-size:13px;
}
.trend-template-table th, .trend-template-table td {
  border:1px solid var(--border); padding:8px; text-align:left;
}
.trend-template-table th { background:var(--surface2); color:var(--text-dim); font-weight:900; }

@media(max-width:720px) {
  .trend-grid { grid-template-columns:1fr; }
  .trend-svg-wrap { height:180px; }
  .trend-card { padding:13px; border-radius:14px; }
}

/* Loading — styled card */
.loading {
  text-align:center; padding:70px 20px; color:var(--text-dim);
  border:1px solid var(--border); border-radius:var(--radius);
  background:var(--surface); box-shadow:var(--shadow-soft);
  font-size:16px; font-weight:800;
}
.loading .spinner {
  display:inline-block; width:30px; height:30px;
  border:3px solid var(--border); border-top-color:var(--accent);
  border-radius:50%; animation:spin .8s linear infinite; margin-bottom:12px;
}
@keyframes spin { to { transform:rotate(360deg); } }

/* Setup */
.setup-box {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:32px; max-width:760px;
  margin:40px auto; box-shadow:var(--shadow);
}
.setup-box h2 { font-family:'DM Sans',system-ui,sans-serif; font-size:30px; margin-bottom:18px; letter-spacing:-.8px; }
.setup-box ol { padding-left:24px; font-size:18px; line-height:1.9; color:var(--text-dim); }
.setup-box code { background:var(--surface2); padding:3px 10px; border-radius:8px; font-size:16px; color:var(--accent); font-weight:800; }
.setup-box button { padding:14px 28px; background:var(--accent); color:#fff; border:none; border-radius:999px;
  font-size:18px; font-weight:900; cursor:pointer; font-family:'DM Sans',sans-serif; margin-top:18px; }

/* Issue cards responsive grid */
.panel.full div[style*="grid-template-columns:1fr 1fr"] { grid-template-columns:repeat(auto-fit, minmax(280px, 1fr)) !important; }
.panel.full div[style*="border-left:3px solid"] { border-radius:16px !important; padding:16px !important; }

/* Responsive */

/* Tablet (iPad) */
@media(max-width:1000px) {
  .dashboard-grid { grid-template-columns:1fr; }
  .header { grid-template-columns:1fr; align-items:start; }
  .period-badge { justify-self:start; }
  .summary-row { grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); }
}

/* Mobile landscape / small tablet */
@media(max-width:720px) {
  .app { padding:16px 14px; }
  .header { padding:20px; border-radius:20px; }
  .header h1 { font-size:28px; letter-spacing:-1px; }
  .header-sub { font-size:16px; }
  .period-badge { padding:10px 18px; font-size:15px; min-width:auto; }
  .summary-row { grid-template-columns:1fr 1fr; gap:10px; }
  .summary-card { padding:16px; min-height:120px; border-radius:16px; }
  .summary-card .label { font-size:11px; margin-bottom:8px; }
  .summary-card .value { font-size:28px; }
  .summary-card .sub { font-size:13px; margin-top:8px; }
  .nav-tabs { padding:5px; gap:4px; border-radius:14px; }
  .nav-tab { padding:10px 14px; font-size:14px; border-radius:10px; }
  .panel { padding:16px; border-radius:16px; }
  .panel-title { font-size:18px; }
  .panel-sub { font-size:14px; }
  .bar-row { grid-template-columns:90px minmax(80px,1fr) 60px; gap:8px; }
  .bar-label { font-size:12px; }
  .bar-track { height:26px; }
  .bar-value { font-size:12px; }
  .heatmap-table { border-spacing:3px; }
  .heatmap-table th { font-size:11px; padding:6px 5px; }
  .heatmap-table td { font-size:13px; padding:8px 6px; border-radius:8px; }
  .heatmap-table td:first-child { min-width:110px; }
  .legend-item { font-size:12px; padding:6px 10px; }
  .legend-dot { width:10px; height:10px; }
  .panel.full div[style*="grid-template-columns:1fr 1fr"] { grid-template-columns:1fr !important; }
}

/* Mobile portrait */
@media(max-width:480px) {
  .app { padding:12px 10px; }
  .header { padding:16px; border-radius:16px; }
  .header h1 { font-size:24px; letter-spacing:-0.8px; }
  .header-sub { font-size:14px; }
  .header::after { width:200px; height:200px; right:-80px; top:-100px; }
  .period-badge { padding:8px 14px; font-size:13px; }
  .summary-row { grid-template-columns:1fr 1fr; gap:8px; }
  .summary-card { padding:14px; min-height:110px; }
  .summary-card .label { font-size:10px; letter-spacing:.5px; }
  .summary-card .value { font-size:24px; letter-spacing:-1px; }
  .summary-card .sub { font-size:11px; }
  .nav-tabs { gap:3px; padding:4px; border-radius:12px; }
  .nav-tab { padding:8px 12px; font-size:12px; font-weight:700; border-radius:8px; }
  .panel { padding:14px; }
  .panel-title { font-size:16px; }
  .panel-sub { font-size:13px; margin-bottom:12px; }
  .bar-row { grid-template-columns:80px minmax(60px,1fr) 55px; gap:6px; }
  .bar-label { font-size:11px; }
  .bar-track { height:22px; }
  .bar-value { font-size:11px; }
  .heatmap-table td:first-child { min-width:90px; font-size:12px; }
  .legend { gap:6px; }
  .legend-item { font-size:11px; padding:5px 8px; }
}

/* Footer */
.footer-bar {
  text-align:center;
  padding:28px 0 8px;
  font-size:14px;
  color:var(--text-dim);
  border-top:1px solid var(--border);
  margin-top:36px;
}

/* =================== PRINT STYLESHEET =================== */
@media print {
  /* Remove background effects */
  body { background:#fff !important; font-size:11px; }
  body::before { display:none; }

  /* Remove interactive elements */
  .nav-tabs, .data-source, .setup-box { display:none !important; }

  /* Clean header */
  .header {
    box-shadow:none; border:1px solid #ddd;
    border-radius:0; padding:16px; margin-bottom:16px;
    background:#fff !important; break-inside:avoid;
  }
  .header::after { display:none; }
  .header h1 { font-size:24px; -webkit-text-fill-color:var(--accent); }
  .header-sub { font-size:12px; }
  .period-badge { box-shadow:none; font-size:12px; padding:6px 12px; }

  /* Cards */
  .summary-row { gap:8px; grid-template-columns:repeat(auto-fit, minmax(140px, 1fr)); }
  .summary-card {
    box-shadow:none; border:1px solid #ddd;
    border-radius:6px; padding:10px; min-height:auto;
    break-inside:avoid;
  }
  .summary-card::after { display:none; }
  .summary-card .label { font-size:8px; margin-bottom:4px; }
  .summary-card .value { font-size:20px; }
  .summary-card .sub { font-size:9px; margin-top:4px; }

  /* Panels */
  .panel {
    box-shadow:none; border:1px solid #ddd;
    border-radius:6px; padding:12px;
    break-inside:avoid;
  }
  .panel-title { font-size:13px; }
  .panel-sub { font-size:10px; margin-bottom:8px; }
  .dashboard-grid { gap:10px; }

  /* Heatmap */
  .heatmap-table th { font-size:8px; padding:4px 3px; }
  .heatmap-table td { font-size:9px; padding:5px 4px; border-radius:3px; }
  .heatmap-table td:first-child { min-width:80px; }
  .cell-green { print-color-adjust:exact; -webkit-print-color-adjust:exact; }
  .cell-amber { print-color-adjust:exact; -webkit-print-color-adjust:exact; }
  .cell-red   { print-color-adjust:exact; -webkit-print-color-adjust:exact; }

  /* Bars */
  .bar-row { grid-template-columns:90px minmax(80px,1fr) 50px; gap:4px; }
  .bar-label { font-size:9px; }
  .bar-track { height:16px; print-color-adjust:exact; -webkit-print-color-adjust:exact; }
  .bar-value { font-size:9px; }

  /* Legend */
  .legend-item { font-size:9px; padding:3px 6px; }
  .legend-dot { width:8px; height:8px; print-color-adjust:exact; -webkit-print-color-adjust:exact; }

  /* Issue cards */
  .panel.full div[style*="border-left:3px solid"] { padding:8px !important; border-radius:4px !important; }

  /* Footer */
  .footer-bar { font-size:10px; padding:12px 0; margin-top:16px; }
  .footer-bar img { display:none; }

  /* Page setup */
  @page { margin:1.5cm; size:A4 landscape; }
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div>
      <h1>Dashboard KPI <span>Cawangan Penjagaan</span></h1>
      <div class="header-sub">Bahagian Kesihatan Pergigian Negeri Sabah</div>
      <div class="data-source" id="dataSourceStatus"></div>
    </div>
    <div class="period-badge" id="periodBadge">Memuatkan...</div>
  </div>
  <div class="nav-tabs" id="navTabs" style="display:none;"></div>
  <div id="content"><div class="loading"><div class="spinner"></div><br>Memuatkan data...</div></div>
  <div class="footer-bar">

<script>
// =====================================================================

// =====================================================================
// Paste your Google Sheets published CSV URL here (one-time setup).
// After that, all data changes happen in the spreadsheet.
const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQktvvtw-4zR_HmPaTQCtr9A4VqY7nuQZFHmedXayjc42QljPSzuDzTDhIGEjHwinozXV-fWhTpN7JH/pub?gid=1187962454&single=true&output=csv';

// Optional: publish the "Trend_Input_State" sheet as CSV and paste the URL here.
// Leave blank first. The dashboard will still create a "Trend Negeri" tab using
// the current SBH values as the latest year, while waiting for historical values.
const TREND_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQktvvtw-4zR_HmPaTQCtr9A4VqY7nuQZFHmedXayjc42QljPSzuDzTDhIGEjHwinozXV-fWhTpN7JH/pub?gid=912084885&single=true&output=csv';

// For 5 years back + current year. Edit if you want a different range.
const TREND_YEAR_START = 2021;
const TREND_YEAR_END   = 2026;

// =====================================================================

/*
  SPREADSHEET CONTRACT
  ====================
  The "Data" sheet must follow this structure:

  Row 1:  Title (ignored)
  Row 2:  "Suku Tahun: Jan - Mac 2026"  ← period label, read by dashboard
  Row 3:  "Tarikh Kemaskini: 9 Mei 2026" ← last updated date, shown in footer
  Row 4:  header row: "KPI / Daerah", KK, SDN, TWU, KGU, KDT, BFT, KB, LD, PP, SBH
  Row 5:  full district names (ignored)
  Row 6+: data rows

  SECTION HEADERS — any row whose first cell is ALL-CAPS and contains no
  numbers becomes a section header.  Examples:
      IBU MENGANDUNG
      TODDLER
      PRASEKOLAH / TADIKA
      OKU              ← you can add this, dashboard will auto-create a tab

  KPI ROWS — any non-section, non-blank row under a section.
    Column A: KPI label (e.g. "% Kedatangan Baru")
    Columns B-K: numeric values per district (KK..SBH)

  SASARAN ROWS — if the row immediately after a KPI row starts with
  "  Sasaran" (leading spaces), it's read as the POA target for that KPI.

  INVERTED KPIs — if the KPI label contains "Unmet", the dashboard
  treats lower values as better (green) and higher as worse (red).

  SPECIAL ROWS — rows starting with "  " (2+ leading spaces) that are
  NOT sasaran rows are ignored (e.g. age headers for Warga Emas).
*/

// =================== CONSTANTS ===================
const DCOLS  = ['KK','SDN','TWU','KGU','KDT','BFT','KB','LD','PP','SBH'];
const DNAMES = {KK:'Kota Kinabalu',SDN:'Sandakan',TWU:'Tawau',KGU:'Keningau',
  KDT:'Kudat',BFT:'Beaufort',KB:'Kota Belud',LD:'Lahad Datu',PP:'Penampang',SBH:'SABAH'};

// =================== STATE ===================
let SECTIONS = [];   // [{id, name, kpis:[{label, values:{KK:…}, target, inverted, isCount}]}]
let PERIOD = '';
let LAST_UPDATED = '';
let SOURCE = 'none';

// Trend state
var TREND_ROWS = [];
var TREND_SOURCE = 'none';
var TREND_MODE = 'main';

// =================== CSV PARSER ===================
function parseCSV(text) {
  return text.split('\n').map(l => l.replace(/\r$/, '')).filter(l => l.trim()).map(line => {
    const cells = []; let cur = '', inQ = false;
    for (const ch of line) {
      if (ch === '"') inQ = !inQ;
      else if (ch === ',' && !inQ) { cells.push(cur); cur = ''; }
      else cur += ch;
    }
    cells.push(cur);
    // Trim all cells except the first one (preserve leading spaces for Sasaran detection)
    return cells.map((c, i) => i === 0 ? c : c.trim());
  });
}

// Strip thousand-separator commas before parsing (e.g. "1,835" → 1835)
function parseNum(raw) {
  if (raw === undefined || raw === null || raw === '') return NaN;
  return parseFloat(String(raw).replace(/,/g, ''));
}

function isSectionHeader(label) {
  if (!label || label.startsWith(' ')) return false;
  // All-caps, may contain / and spaces, no digits
  return /^[A-Z\s\/\-()]+$/.test(label) && label.length > 2;
}

function parseSheet(rows) {
  SECTIONS = [];
  // Period from row 2
  if (rows[1] && rows[1][0]) {
    PERIOD = rows[1][0].replace(/Suku Tahun:\s*/i, '').trim() || 'Q1 2026';
  }
  // Last updated from row 3
  if (rows[2] && rows[2][0]) {
    LAST_UPDATED = rows[2][0].replace(/Tarikh Kemaskini:\s*/i, '').trim();
  }

  let currentSection = null;
  let lastKpi = null;

  for (let i = 3; i < rows.length; i++) {
    const row = rows[i];
    if (!row || !row[0]) continue;
    const label = row[0];

    // Skip district name row
    if (label.trim() === '' || label.trim() === 'KPI / Daerah') continue;

    // Sasaran row?
    if (/^\s{2,}Sasaran/.test(label) && lastKpi) {
      // Find first non-empty numeric value as the target
      for (let c = 1; c <= 10; c++) {
        const v = parseNum(row[c]);
        if (!isNaN(v)) { lastKpi.target = v; break; }
      }
      continue;
    }

    // Other indented rows → skip
    if (/^\s{2,}/.test(label)) continue;

    // Section header?
    if (isSectionHeader(label.trim())) {
      currentSection = { id: label.trim().toLowerCase().replace(/[\s\/]+/g, '_'), name: label.trim(), kpis: [] };
      SECTIONS.push(currentSection);
      lastKpi = null;
      continue;
    }

    // KPI data row
    if (!currentSection) continue;

    const vals = {};
    let hasAny = false;
    for (let c = 0; c < DCOLS.length; c++) {
      const raw = row[c + 1];
      const v = parseNum(raw);
      if (!isNaN(v)) {
        vals[DCOLS[c]] = v;
        hasAny = true;
      }
    }
    if (!hasAny) continue;

    const inverted = /unmet/i.test(label);
    const isCount = /jumlah|bilangan/i.test(label);

    const kpi = { label: label.trim(), values: vals, target: null, inverted, isCount };
    currentSection.kpis.push(kpi);
    lastKpi = kpi;
  }
}


// =================== TREND DATA ===================
function normHeader(h) {
  return String(h || '').trim().toLowerCase().replace(/\s+/g, ' ');
}

function getYearRange() {
  const years = [];
  for (let y = TREND_YEAR_START; y <= TREND_YEAR_END; y++) years.push(String(y));
  return years;
}

function extractYearFromPeriod() {
  const m = String(PERIOD || '').match(/20\d{2}/g);
  if (m && m.length) return Number(m[m.length - 1]);
  return TREND_YEAR_END;
}

function inferUnit(kpi) {
  if (kpi.isCount || /jumlah|bilangan/i.test(kpi.label)) return 'Count';
  if (/purata|mean|dmft|dft|dfx/i.test(kpi.label)) return 'Mean';
  if (/%|liputan|kedatangan|selesai|mbk|mbg|tpr|unmet|saringan|gigi/i.test(kpi.label)) return '%';
  return 'Value';
}

function inferDirection(kpi) {
  if (kpi.inverted || /unmet/i.test(kpi.label)) return 'Lower better';
  if (kpi.isCount || /jumlah|bilangan/i.test(kpi.label)) return 'Context only';
  if (/purata|mean|dmft|dft|dfx/i.test(kpi.label)) return 'Lower better';
  return 'Higher better';
}

function inferInterpretation(kpi) {
  if (kpi.isCount || /jumlah|bilangan/i.test(kpi.label)) return 'Service Volume';
  if (/purata|mean|dmft|dft|dfx/i.test(kpi.label)) return 'Disease Burden';
  if (/liputan/i.test(kpi.label)) return 'Coverage';
  return 'Achievement';
}

function makeKpiCode(sectionName, kpiLabel) {
  const s = sectionName.toUpperCase().replace(/[^A-Z0-9]+/g, '_').replace(/^_|_$/g, '').slice(0, 14);
  const k = kpiLabel.toUpperCase().replace(/[^A-Z0-9]+/g, '_').replace(/^_|_$/g, '').slice(0, 22);
  return `${s}_${k}`;
}

function buildTrendFromCurrent() {
  const currentYear = String(extractYearFromPeriod());
  const years = getYearRange();
  TREND_ROWS = [];

  SECTIONS.forEach(sec => {
    sec.kpis.forEach(kpi => {
      const vals = {};
      years.forEach(y => vals[y] = '');
      if (years.includes(currentYear) && kpi.values && kpi.values.SBH != null) {
        vals[currentYear] = kpi.values.SBH;
      }
      TREND_ROWS.push({
        section: sec.name,
        code: makeKpiCode(sec.name, kpi.label),
        label: kpi.label,
        unit: inferUnit(kpi),
        direction: inferDirection(kpi),
        target: kpi.target || '',
        interpretation: inferInterpretation(kpi),
        remarks: '',
        values: vals
      });
    });
  });
  TREND_SOURCE = 'auto-current';
}

function parseTrendWide(rows) {
  const headerIdx = rows.findIndex(r => r.some(c => /kpi\s*code|kpi\s*label|section/i.test(c)));
  if (headerIdx < 0) return [];
  const header = rows[headerIdx].map(normHeader);
  const idx = nameList => {
    for (const name of nameList) {
      const i = header.indexOf(normHeader(name));
      if (i >= 0) return i;
    }
    return -1;
  };

  const iSection = idx(['Section','Kategori','Program']);
  const iCode = idx(['KPI Code','Kod KPI']);
  const iLabel = idx(['KPI Label','KPI','Indikator']);
  const iUnit = idx(['Unit']);
  const iDirection = idx(['Direction','Arah','Trend Direction']);
  const iTarget = idx(['Target','Sasaran']);
  const iInterpretation = idx(['Interpretation Type','Jenis Interpretasi','Interpretation']);
  const iRemarks = idx(['Remarks','Catatan']);

  const yearCols = [];
  header.forEach((h, i) => {
    if (/^20\d{2}$/.test(h)) yearCols.push({year:h, col:i});
  });

  const out = [];
  for (let r = headerIdx + 1; r < rows.length; r++) {
    const row = rows[r];
    if (!row || row.every(c => String(c || '').trim() === '')) continue;

    const label = iLabel >= 0 ? String(row[iLabel] || '').trim() : '';
    if (!label) continue;

    const vals = {};
    yearCols.forEach(yc => {
      const raw = row[yc.col];
      const v = parseNum(raw);
      vals[yc.year] = isNaN(v) ? '' : v;
    });

    out.push({
      section: iSection >= 0 ? String(row[iSection] || '').trim() : 'TREND',
      code: iCode >= 0 ? String(row[iCode] || '').trim() : makeKpiCode(row[iSection] || 'TREND', label),
      label,
      unit: iUnit >= 0 ? String(row[iUnit] || '').trim() : '',
      direction: iDirection >= 0 ? String(row[iDirection] || '').trim() : 'Higher better',
      target: iTarget >= 0 && !isNaN(parseNum(row[iTarget])) ? parseNum(row[iTarget]) : '',
      interpretation: iInterpretation >= 0 ? String(row[iInterpretation] || '').trim() : 'Achievement',
      remarks: iRemarks >= 0 ? String(row[iRemarks] || '').trim() : '',
      values: vals
    });
  }
  return out;
}

function parseTrendLong(rows) {
  const headerIdx = rows.findIndex(r => r.some(c => /^year$/i.test(c)) && r.some(c => /^value$/i.test(c)));
  if (headerIdx < 0) return [];
  const header = rows[headerIdx].map(normHeader);
  const get = nameList => {
    for (const name of nameList) {
      const i = header.indexOf(normHeader(name));
      if (i >= 0) return i;
    }
    return -1;
  };

  const iYear = get(['Year']);
  const iSection = get(['Section','Kategori','Program']);
  const iCode = get(['KPI Code','Kod KPI']);
  const iLabel = get(['KPI Label','KPI','Indikator']);
  const iValue = get(['Value','Nilai']);
  const iTarget = get(['Target','Sasaran']);
  const iUnit = get(['Unit']);
  const iDirection = get(['Direction','Arah','Trend Direction']);
  const iInterpretation = get(['Interpretation Type','Jenis Interpretasi','Interpretation']);
  const iRemarks = get(['Remarks','Catatan']);

  const map = new Map();
  for (let r = headerIdx + 1; r < rows.length; r++) {
    const row = rows[r];
    const label = iLabel >= 0 ? String(row[iLabel] || '').trim() : '';
    const year = iYear >= 0 ? String(row[iYear] || '').trim() : '';
    if (!label || !/^20\d{2}$/.test(year)) continue;

    const code = iCode >= 0 && row[iCode] ? String(row[iCode]).trim() : makeKpiCode(row[iSection] || 'TREND', label);
    if (!map.has(code)) {
      map.set(code, {
        section: iSection >= 0 ? String(row[iSection] || '').trim() : 'TREND',
        code,
        label,
        unit: iUnit >= 0 ? String(row[iUnit] || '').trim() : '',
        direction: iDirection >= 0 ? String(row[iDirection] || '').trim() : 'Higher better',
        target: iTarget >= 0 && !isNaN(parseNum(row[iTarget])) ? parseNum(row[iTarget]) : '',
        interpretation: iInterpretation >= 0 ? String(row[iInterpretation] || '').trim() : 'Achievement',
        remarks: iRemarks >= 0 ? String(row[iRemarks] || '').trim() : '',
        values: {}
      });
    }
    const v = parseNum(row[iValue]);
    map.get(code).values[year] = isNaN(v) ? '' : v;
  }
  return [...map.values()];
}

// Parser for section-header format: section names as standalone rows,
// header row has "KPI" + year columns, KPI rows underneath each section.
function parseTrendSectionHeader(rows) {
  // Find header row: first column is "KPI" and other columns are years
  const headerIdx = rows.findIndex(r =>
    /^kpi$/i.test(String(r[0] || '').trim()) &&
    r.some(c => /^20\d{2}$/.test(String(c || '').trim()))
  );
  if (headerIdx < 0) return [];

  const header = rows[headerIdx].map(c => String(c || '').trim());
  const yearCols = [];
  header.forEach((h, i) => {
    if (/^20\d{2}$/.test(h)) yearCols.push({ year: h, col: i });
  });
  if (!yearCols.length) return [];

  
  const out = [];
  let currentSection = '';

  for (let r = headerIdx + 1; r < rows.length; r++) {
    const row = rows[r];
    if (!row || row.every(c => String(c || '').trim() === '')) continue;

    const label = String(row[0] || '').trim();
    if (!label) continue;

    // Skip note rows
    if (/^nota:/i.test(label)) continue;

    // Check if this is a section header using the same rule as the Data tab
    const hasYearValues = yearCols.some(yc => String(row[yc.col] || '').trim() !== '');

    if (isSectionHeader(label) && !hasYearValues) {
        currentSection = label;
        continue;
    }

    // This is a KPI row
    const vals = {};
    yearCols.forEach(yc => {
      const raw = row[yc.col];
      const v = parseNum(raw);
      vals[yc.year] = isNaN(v) ? '' : v;
    });

    const kpiObj = {
      section: currentSection,
      code: makeKpiCode(currentSection, label),
      label,
      unit: '',
      direction: 'Higher better',
      target: '',
      interpretation: 'Achievement',
      remarks: '',
      values: vals
    };

    // Infer metadata from label
    kpiObj.unit = inferUnit(kpiObj);
    kpiObj.direction = inferDirection(kpiObj);
    kpiObj.interpretation = inferInterpretation(kpiObj);

    // Pull target from current Data sheet if available
    const matchSection = SECTIONS.find(s =>
      s.name.toUpperCase() === currentSection.toUpperCase()
    );
    if (matchSection) {
      const matchKpi = matchSection.kpis.find(k => k.label === label);
      if (matchKpi && matchKpi.target != null) {
        kpiObj.target = matchKpi.target;
      }
    }

    out.push(kpiObj);
  }
  return out;
}

function parseTrendSheet(rows) {
  const wide = parseTrendWide(rows);
  if (wide.length) return wide;
  const sectionHeader = parseTrendSectionHeader(rows);
  if (sectionHeader.length) return sectionHeader;
  const long = parseTrendLong(rows);
  if (long.length) return long;
  return [];
}

async function loadTrendData() {
  if (!TREND_CSV_URL) {
    buildTrendFromCurrent();
    return;
  }

  try {
    const r = await fetch(TREND_CSV_URL);
    if (!r.ok) throw new Error(r.status);
    const rows = parseCSV(await r.text());
    const parsed = parseTrendSheet(rows);
    if (!parsed.length) throw new Error('Trend CSV structure not recognised');
    TREND_ROWS = parsed;
    TREND_SOURCE = 'live-trend';
  } catch(e) {
    console.warn('Trend sheet load failed, using current SBH values only:', e);
    buildTrendFromCurrent();
    TREND_SOURCE = 'trend-fallback-current';
  }
}

// =================== LOAD ===================
async function loadData() {
  if (SHEET_CSV_URL) {
    try {
      const r = await fetch(SHEET_CSV_URL);
      if (!r.ok) throw new Error(r.status);
      parseSheet(parseCSV(await r.text()));
      SOURCE = 'live';
    } catch(e) {
      console.warn('Sheet load failed, using fallback:', e);
      loadFallback(); SOURCE = 'fallback';
    }
  } else {
    loadFallback(); SOURCE = 'fallback';
  }

  // Load optional state-level trend data after the current Data sheet is ready.
  await loadTrendData();
  
  bootUI();
}

// =================== HELPERS ===================
function statusCls(val, target, inv) {
  if (val == null) return 'cell-na';
  if (!target) return 'cell-na';
  if (inv) {
    // Inverted: lower is better (e.g. Unmet Treatment Need)
    // Below target = green, near target = amber, above target = red
    if (val <= target) return 'cell-green';
    if (val <= target * 1.3) return 'cell-amber';
    return 'cell-red';
  }
  // Normal: higher is better
  const ratio = val / target;
  if (ratio >= 0.9) return 'cell-green';
  if (ratio >= 0.7) return 'cell-amber';
  return 'cell-red';
}
function barCol(cls) {
  if (cls === 'cell-green') return 'var(--green)';
  if (cls === 'cell-amber') return 'var(--amber)';
  if (cls === 'cell-red')   return 'var(--red)';
  return 'var(--accent)';
}
function fP(v) { return v != null ? v.toFixed(1) + '%' : '—'; }
function fI(v) { return v != null ? v.toLocaleString() : '—'; }
function fD(v) { return v != null ? v.toFixed(2) : '—'; }
function fmtVal(kpi, v) {
  if (v == null) return '—';
  if (kpi.isCount) return fI(v);
  if (kpi.label.match(/purata|mean|dmft|dft|dfx/i)) return fD(v);
  return fP(v);
}

// Which districts have data for a KPI
function activeDists(kpi) {
  return DCOLS.slice(0, 9).filter(d => kpi.values[d] != null);
}

// Auto-detect a reasonable max for bar charts
function autoMax(kpi) {
  if (kpi.isCount) {
    const mx = Math.max(...Object.values(kpi.values).filter(v => v != null));
    return mx * 1.15;
  }
  if (kpi.label.match(/purata|mean|dmft|dft|dfx/i)) {
    return Math.max(...Object.values(kpi.values).filter(v => v != null)) * 1.3;
  }
  return 100;
}

function renderOverview() {
  const el = document.getElementById('content');
  // Summary cards: first KPI of each section that has a target, or the first % KPI
  let cards = [];
  SECTIONS.forEach(sec => {
    const kpi = sec.kpis.find(k => k.target) || sec.kpis.find(k => k.label.startsWith('%')) || sec.kpis[0];
    if (!kpi) return;
    const v = kpi.values.SBH;
    let status = 'amber';
    if (kpi.target) {
      const cls = statusCls(v, kpi.target, kpi.inverted);
      status = cls === 'cell-green' ? 'green' : cls === 'cell-red' ? 'red' : 'amber';
    }
    cards.push({
      label: sec.name, value: fmtVal(kpi, v), status,
      sub: kpi.label + (kpi.target ? ` — Sasaran: ${kpi.target}` : '')
    });
  });

  let html = `<div class="summary-row">${cards.map(c => `
    <div class="summary-card ${c.status}">
      <div class="label">${c.label}</div>
      <div class="value">${c.value}</div>
      <div class="sub">${c.sub}</div>
    </div>`).join('')}</div>`;

  // Heatmap: only KPIs that have targets
  const targetKpis = [];
  SECTIONS.forEach(sec => {
    sec.kpis.filter(k => k.target).forEach(k => {
      targetKpis.push({ section: sec.name, kpi: k });
    });
  });

  if (targetKpis.length > 0) {
    html += `<div class="panel full" style="margin-bottom:16px;overflow-x:auto;">
      <div class="panel-title">Heatmap Prestasi Daerah</div>
      <div class="panel-sub">Hanya KPI yang mempunyai sasaran POA dipaparkan</div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>Tercapai (≥90%)</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--amber)"></div>Hampir (70-90%)</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div>Belum Tercapai (<70%)</div>
      </div>
      <table class="heatmap-table">
      ${(() => {
        // Build grouped header: row 1 = section names with colspan, row 2 = KPI labels
        const groups = [];
        let lastSection = '';
        targetKpis.forEach(tk => {
          if (tk.section !== lastSection) {
            groups.push({ section: tk.section, count: 1 });
            lastSection = tk.section;
          } else {
            groups[groups.length - 1].count++;
          }
        });
        return `<tr><th rowspan="2" style="vertical-align:bottom;">Daerah</th>${groups.map(g =>
          `<th colspan="${g.count}" style="border-bottom:2px solid var(--border);padding-bottom:4px;">${g.section}</th>`
        ).join('')}</tr>
        <tr>${targetKpis.map(tk => `<th style="font-size:14px;font-weight:500;">${tk.kpi.label}</th>`).join('')}</tr>`;
      })()}
      ${[...DCOLS.slice(0,9), 'SBH'].map(d => {
        const name = d === 'SBH' ? '<strong>SABAH</strong>' : DNAMES[d];
        const wrap = d === 'SBH' ? v => `<strong>${v}</strong>` : v => v;
        return `<tr><td>${name}</td>${targetKpis.map(tk => {
          const v = tk.kpi.values[d];
          const cls = statusCls(v, tk.kpi.target, tk.kpi.inverted);
          return `<td class="${cls}">${wrap(fmtVal(tk.kpi, v))}</td>`;
        }).join('')}</tr>`;
      }).join('')}
      </table></div>`;
  }

  // Auto-generated issues: KPIs where SBH is red or amber
  const issues = [];
  SECTIONS.forEach(sec => {
    sec.kpis.forEach(kpi => {
      if (!kpi.target) return;
      const val = kpi.values.SBH;
      if (val == null) return;
      const cls = statusCls(val, kpi.target, kpi.inverted);
      if (cls === 'cell-red' || cls === 'cell-amber') {
        // Calculate gap from target (how far off, as ratio)
        const gap = kpi.inverted ? (val / kpi.target) : (kpi.target / val);
        // Find worst district
        const dists = activeDists(kpi);
        let worst = dists[0], worstV = kpi.values[dists[0]];
        dists.forEach(d => {
          const v = kpi.values[d];
          if (v == null) return;
          if (kpi.inverted ? v > worstV : v < worstV) { worst = d; worstV = v; }
        });
        issues.push({
          title: `${sec.name}: ${kpi.label} = ${fmtVal(kpi, val)}`,
          desc: cls === 'cell-red'
            ? `Sasaran: ${kpi.target}. Daerah paling kritikal: ${DNAMES[worst]} (${fmtVal(kpi, worstV)})`
            : (() => {
                // Count districts that hit vs miss the target
                const achieved = dists.filter(d => {
                  const v = kpi.values[d];
                  if (v == null) return false;
                  return kpi.inverted ? v <= kpi.target : v >= kpi.target;
                });
                const notAchieved = dists.length - achieved.length;
                const needNames = dists.filter(d => {
                  const v = kpi.values[d];
                  if (v == null) return false;
                  return kpi.inverted ? v > kpi.target : v < kpi.target;
                }).map(d => DNAMES[d]);
                return `Sasaran: ${kpi.target}. ${achieved.length}/${dists.length} daerah telah capai sasaran. Perlu usaha lagi: ${needNames.join(', ')}`;
              })(),
          color: cls === 'cell-red' ? 'red' : 'amber',
          gap: gap
        });
      }
    });
  });

  // Sort: red items first (worst gap first), then amber items (closest to target first)
  const redIssues = issues.filter(i => i.color === 'red').sort((a, b) => b.gap - a.gap);
  const amberIssues = issues.filter(i => i.color === 'amber').sort((a, b) => a.gap - b.gap);

  if (issues.length > 0) {
    html += `<div class="panel full">
      <div class="panel-title" style="color:var(--red);">Isu — KPI Belum Mencapai Sasaran</div>
      <div class="panel-sub">Disusun mengikut keutamaan — kritikal di atas, hampir tercapai di bawah</div>`;

    if (redIssues.length > 0) {
      html += `<div style="font-size:15px;font-weight:700;color:var(--red);margin:16px 0 8px;text-transform:uppercase;letter-spacing:0.5px;">Kritikal — Perlu Tindakan Segera</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
          ${redIssues.map(iss => `
            <div style="padding:12px;background:var(--red-dim);border-radius:8px;border-left:3px solid var(--red);">
              <div style="font-size:18px;font-weight:700;color:var(--red);margin-bottom:6px;">${iss.title}</div>
              <div style="font-size:17px;color:var(--text-dim);">${iss.desc}</div>
            </div>`).join('')}
        </div>`;
    }

    if (amberIssues.length > 0) {
      html += `<div style="font-size:15px;font-weight:700;color:var(--amber);margin:20px 0 8px;text-transform:uppercase;letter-spacing:0.5px;">Hampir Tercapai — Tingkatkan Sedikit Lagi</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
          ${amberIssues.map(iss => `
            <div style="padding:12px;background:var(--amber-dim);border-radius:8px;border-left:3px solid var(--amber);">
              <div style="font-size:18px;font-weight:700;color:var(--amber);margin-bottom:6px;">${iss.title}</div>
              <div style="font-size:17px;color:var(--text-dim);">${iss.desc}</div>
            </div>`).join('')}
        </div>`;
    }

    html += `</div>`;
  }

  el.innerHTML = html;
}


// =================== TREND RENDERER ===================
function cleanNum(v) {
  const n = typeof v === 'number' ? v : parseNum(v);
  return isNaN(n) ? null : n;
}

function trendYearsForRows(rows) {
  const years = new Set(getYearRange());
  rows.forEach(r => Object.keys(r.values || {}).forEach(y => { if (/^20\d{2}$/.test(y)) years.add(y); }));
  return [...years].sort();
}

function trendFmt(row, v) {
  const n = cleanNum(v);
  if (n == null) return '—';
  if (/count/i.test(row.unit || '') || /jumlah|bilangan/i.test(row.label || '')) return n.toLocaleString();
  if (/%/.test(row.unit || '') || /%|liputan|kedatangan|selesai|mbk|mbg|tpr|unmet|saringan|gigi/i.test(row.label || '')) return n.toFixed(1) + '%';
  if (/mean|purata|dmft|dft|dfx/i.test((row.unit || '') + ' ' + (row.label || ''))) return n.toFixed(2);
  return n.toFixed(1);
}

function trendStatus(row) {
  const years = trendYearsForRows([row]);
  const points = years
    .map(y => ({ year: y, value: cleanNum(row.values?.[y]) }))
    .filter(p => p.value != null);

  if (points.length < 2) {
    return { cls: 'watch', text: 'Data Tidak Mencukupi' };
  }

  const first = points[0].value;
  const last = points[points.length - 1].value;
  const diff = last - first;

  const lowerBetter =
    /lower/i.test(row.direction || '') ||
    /unmet|purata|dmft|dft|dfx/i.test(row.label || '');

  const context =
    /context/i.test(row.direction || '') ||
    /service volume/i.test(row.interpretation || '');

  if (context) {
    return { cls: 'watch', text: diff >= 0 ? 'Volum ↑' : 'Volum ↓' };
  }

  if (Math.abs(diff) < 0.0001) {
    return { cls: 'watch', text: 'Stabil' };
  }

  const improving = lowerBetter ? diff < 0 : diff > 0;

  return {
    cls: improving ? 'good' : 'bad',
    text: improving ? 'Meningkat' : 'Menurun'
  };
}

function bmMetaText(text) {
  const t = String(text || '').trim();

  const map = {
    'Achievement': 'Pencapaian',
    'Coverage': 'Liputan',
    'Disease Burden': 'Beban Penyakit',
    'Service Volume': 'Volum Perkhidmatan',
    'Higher better': 'Lebih tinggi lebih baik',
    'Lower better': 'Lebih rendah lebih baik',
    'Context only': 'Konteks sahaja',
    'Count': 'Bilangan',
    'Mean': 'Purata',
    'Value': 'Nilai'
  };

  return map[t] || t || 'Tidak dinyatakan';
}
  
function trendSvg(row) {
  const years = trendYearsForRows([row]);
  const points = years.map(y => ({year:y, value:cleanNum(row.values?.[y])}));
  const valid = points.filter(p => p.value != null);

  if (!valid.length) {  
    return `<div class="trend-empty">Nilai belum dimasukkan. Sila isi data KPI ini dalam <strong>Trend_Input_State</strong>.</div>`;
  }

  const w = 560, h = 210;
  const pad = {l:48, r:22, t:26, b:42};
  const plotW = w - pad.l - pad.r;
  const plotH = h - pad.t - pad.b;
  let vals = valid.map(p => p.value);
  const target = cleanNum(row.target);
  if (target != null) vals.push(target);

  let minV = Math.min(...vals);
  let maxV = Math.max(...vals);
  if (minV === maxV) { minV = minV - 1; maxV = maxV + 1; }
  const range = maxV - minV;
  minV = minV - range * 0.12;
  maxV = maxV + range * 0.12;

  const xFor = idx => pad.l + (years.length <= 1 ? plotW / 2 : (idx / (years.length - 1)) * plotW);
  const yFor = val => pad.t + (1 - ((val - minV) / (maxV - minV))) * plotH;

  const linePts = points.map((p, idx) => {
    if (p.value == null) return null;
    return `${xFor(idx)},${yFor(p.value)}`;
  }).filter(Boolean).join(' ');

  const targetY = target != null ? yFor(target) : null;
  const yTicks = [minV, (minV + maxV) / 2, maxV];

  return `<div class="trend-svg-wrap">
    <svg viewBox="0 0 ${w} ${h}" width="100%" height="100%" role="img" aria-label="${row.label} trend chart">
      <rect x="0" y="0" width="${w}" height="${h}" fill="transparent"></rect>
      ${yTicks.map(t => `<line x1="${pad.l}" x2="${w-pad.r}" y1="${yFor(t)}" y2="${yFor(t)}" stroke="rgba(15,23,42,.08)" stroke-width="1"></line>
        <text x="${pad.l-8}" y="${yFor(t)+4}" text-anchor="end" font-size="11" fill="#64748b">${trendFmt(row, t).replace('%','')}</text>`).join('')}
      ${targetY != null ? `<line x1="${pad.l}" x2="${w-pad.r}" y1="${targetY}" y2="${targetY}" stroke="rgba(15,23,42,.35)" stroke-width="2" stroke-dasharray="5 5"></line>
        <text x="${w-pad.r}" y="${targetY-6}" text-anchor="end" font-size="11" font-weight="800" fill="#64748b">Sasaran ${trendFmt(row, target)}</text>` : ''}
      ${linePts ? `<polyline points="${linePts}" fill="none" stroke="var(--accent)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"></polyline>` : ''}
      ${points.map((p, idx) => {
        const x = xFor(idx);
        const yr = `<text x="${x}" y="${h-18}" text-anchor="middle" font-size="12" font-weight="800" fill="#64748b">${p.year}</text>`;
        if (p.value == null) return yr + `<circle cx="${x}" cy="${h-36}" r="3" fill="#cbd5e1"></circle>`;
        const y = yFor(p.value);
        return `<circle cx="${x}" cy="${y}" r="6" fill="white" stroke="var(--accent)" stroke-width="3"></circle>
          <text x="${x}" y="${y-12}" text-anchor="middle" font-size="12" font-weight="900" fill="#122033">${trendFmt(row, p.value)}</text>${yr}`;
      }).join('')}
    </svg>
  </div>`;
}

  const years = getYearRange();

    : TREND_ROWS.filter(r => !/service volume/i.test(r.interpretation || '') && !/context/i.test(r.direction || ''));

  const withAnyValue = visibleRows.filter(r =>
    Object.values(r.values || {}).some(v => cleanNum(v) != null)
  ).length;

  const sourceText = TREND_SOURCE === 'live-trend'
    ? 'Data trend bersambung'
    : TREND_SOURCE === 'trend-fallback-current'
      ? 'CSV trend gagal dibaca — memaparkan nilai SBH semasa sahaja'
      : 'Dijana daripada nilai SBH semasa';

  let html = `<div class="summary-row">
    <div class="summary-card green">
      <div class="label">Skop Trend</div>
      <div class="value">Sabah</div>      
    </div>

    <div class="summary-card amber">

      <div class="value">${years[0]}–${currentYear}</div>      
    </div>

    <div class="summary-card">
      <div class="label">Indikator Trend</div>
      <div class="value">${visibleRows.length}</div>      
    </div>
  </div>`;

  html += `<div class="panel full">
    <div class="trend-toolbar">
      <div>
        <div class="panel-title">Trend Pencapaian Negeri</div>        
      </div>
      <div class="trend-actions">
        <button class="trend-btn ${TREND_MODE === 'main' ? 'active' : ''}" onclick="TREND_MODE='main';renderTrend()">Indikator Utama</button>
        <button class="trend-btn ${TREND_MODE === 'all' ? 'active' : ''}" onclick="TREND_MODE='all';renderTrend()">Semua Indikator</button>
      </div>
    </div>`;

  if (TREND_SOURCE !== 'live-trend') {
    html += `<div class="trend-empty" style="margin-bottom:18px;">
      <strong>Tetapan diperlukan:</strong> Sediakan tab Google Sheet bernama <strong>Trend_Input_State</strong>, gunakan struktur di bawah, publish tab tersebut sebagai CSV, kemudian tampal URL ke dalam <code>TREND_CSV_URL</code> dalam fail HTML ini.
      Buat sementara waktu, tab trend hanya memaparkan nilai SBH terkini daripada sheet <strong>Data</strong>.
      <div style="overflow-x:auto;">${trendTemplatePreview()}</div>
    </div>`;
  }

  const grouped = {};
  visibleRows.forEach(r => {
    const key = r.section || 'TREND';
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(r);
  });

  Object.keys(grouped).forEach(section => {
    html += `<div class="trend-group">
      <div class="trend-group-title">${section}</div>
      <div class="trend-grid">`;
    grouped[section].forEach(row => {
      const st = trendStatus(row);
      const target = cleanNum(row.target);
      html += `<div class="trend-card">
        <div class="trend-card-header">
          <div class="trend-card-title">${row.label}</div>
          <div class="trend-chip ${st.cls}">${st.text}</div>
        </div>
        <div class="trend-meta">
          <span>${bmMetaText(row.interpretation || 'Achievement')}</span>
          <span>${bmMetaText(row.direction || 'Higher better')}</span>
          ${target != null ? `<span>Sasaran: ${trendFmt(row, target)}</span>` : ''}
        </div>
        ${trendSvg(row)}
        ${row.remarks ? `<div class="trend-note">${row.remarks}</div>` : ''}
      </div>`;
    });
    html += `</div></div>`;
  });

  html += `</div>`;
  el.innerHTML = html;
}


// =================== GENERIC SECTION RENDERER ===================
function renderSection(sec) {
  const el = document.getElementById('content');

  // Check data completeness
  const allDists = DCOLS.slice(0, 9);
  const firstKpi = sec.kpis[0];
  const coveredDists = firstKpi ? activeDists(firstKpi) : [];
  const incomplete = coveredDists.length < 9 && coveredDists.length > 0;

  let html = '';

  // Incompleteness warning
  if (incomplete) {
    const missing = allDists.filter(d => !coveredDists.includes(d)).map(d => DNAMES[d]);
    html += `<div style="padding:16px;background:var(--amber-dim);border:1px solid var(--amber);border-radius:var(--radius);margin-bottom:24px;font-size:20px;">
      <strong style="color:var(--amber)">Data Tidak Lengkap:</strong> Hanya ${coveredDists.length} daripada 9 daerah mempunyai data. Tiada data: ${missing.join(', ')}.
    </div>`;
  }

  // Summary cards — SBH value for each KPI
  html += `<div class="summary-row">${sec.kpis.map(kpi => {
    const v = kpi.values.SBH;
    let status = 'amber';
    if (kpi.target) {
      const cls = statusCls(v, kpi.target, kpi.inverted);
      status = cls === 'cell-green' ? 'green' : cls === 'cell-red' ? 'red' : 'amber';
    }
    return `<div class="summary-card ${status}">
      <div class="label">${kpi.label}</div>
      <div class="value">${fmtVal(kpi, v)}</div>
      ${kpi.target ? `<div class="sub">Sasaran: ${kpi.target}</div>` : ''}
    </div>`;
  }).join('')}</div>`;

  // Bar charts — one panel per non-count KPI
  const barKpis = sec.kpis.filter(k => !k.isCount);
  html += `<div class="dashboard-grid">`;

  barKpis.forEach(kpi => {
    const dists = activeDists(kpi);
    const mx = autoMax(kpi);
    html += `<div class="panel">
      <div class="panel-title">${kpi.label}</div>
      ${kpi.target ? `<div class="panel-sub">Sasaran: ${kpi.target}${kpi.inverted ? ' (semakin rendah semakin baik)' : ''}</div>` : '<div class="panel-sub"></div>'}
      <div class="bar-chart">
        ${dists.map(d => {
          const v = kpi.values[d];
          if (v == null) return '';
          const pct = Math.min((v / mx) * 100, 100);
          const cls = kpi.target ? statusCls(v, kpi.target, kpi.inverted) : 'cell-na';
          const col = kpi.target ? barCol(cls) : 'var(--accent)';
          return `<div class="bar-row">
            <div class="bar-label">${DNAMES[d] || d}</div>
            <div class="bar-track">
              <div class="bar-fill" style="width:${pct}%;background:${col};"></div>
              ${kpi.target ? `<div class="bar-target" style="left:${Math.min((kpi.target / mx) * 100, 100)}%"></div>` : ''}
            </div>
            <div class="bar-value" style="color:${col}">${fmtVal(kpi, v)}</div>
          </div>`;
        }).join('')}
      </div>
      ${kpi.target ? `<div style="margin-top:10px;font-size:16px;color:var(--text-dim);">Garis kelabu = Sasaran (${kpi.target})</div>` : ''}
    </div>`;
  });

  html += `</div>`;
  el.innerHTML = html;
}

} catch(err) {
  document.getElementById('content').innerHTML =
    '<div style="padding:40px;color:red;font-size:18px;">'
    + '<strong>Dashboard Error:</strong><br>' + err.message
    + '<br><br><pre>' + err.stack + '</pre></div>';
}

  document.getElementById('content').innerHTML =
    '<div style="padding:40px;color:red;font-size:18px;">'
    + '<strong>JS Error:</strong> ' + msg
    + '<br>Line: ' + line + ', Col: ' + col
    + (err ? '<br><pre>' + err.stack + '</pre>' : '') + '</div>';
};
